<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dry July Tally</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Patrick+Hand&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --chalkboard: #1d3b2e;
    --chalkboard-dark: #152c22;
    --chalk: #f4f1e6;
    --chalk-dim: #cfd6c9;
    --chalk-yellow: #f2cd6c;
    --chalk-pink: #e88ba0;
    --line: rgba(244,241,230,0.25);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.04), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(255,255,255,0.03), transparent 60%),
      var(--chalkboard);
    background-color: var(--chalkboard);
    color: var(--chalk);
    font-family: 'Patrick Hand', cursive;
    padding: 32px 16px 80px;
    position: relative;
  }

  /* subtle chalk dust texture */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.05;
    background-image: radial-gradient(circle, #fff 1px, transparent 1px);
    background-size: 3px 3px;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
  }

  /* header */
  header {
    text-align: center;
    margin-bottom: 8px;
    border-bottom: 2px dashed var(--line);
    padding-bottom: 18px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--chalk-yellow);
    opacity: 0.85;
  }

  h1 {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 64px;
    margin: 4px 0 6px;
    line-height: 1;
    text-shadow: 0 0 14px rgba(244,241,230,0.15);
  }

  .subtitle {
    font-size: 18px;
    color: var(--chalk-dim);
  }

  /* account corner */
  .account-corner {
    display: flex;
    justify-content: flex-end;
    margin: 18px 0 8px;
  }

  #auth-section, #drink-section {
    background: rgba(0,0,0,0.18);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  input[type="email"], input[type="password"] {
    background: rgba(244,241,230,0.08);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--chalk);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    width: 130px;
  }
  input::placeholder { color: var(--chalk-dim); opacity: 0.6; }
  input:focus {
    outline: none;
    border-color: var(--chalk-yellow);
  }

  button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: transparent;
    border: 1px solid var(--chalk-dim);
    color: var(--chalk);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  button:hover {
    border-color: var(--chalk-yellow);
    color: var(--chalk-yellow);
  }
  button:focus-visible {
    outline: 2px solid var(--chalk-yellow);
    outline-offset: 2px;
  }

  #auth-status {
    color: var(--chalk-pink);
    font-size: 12px;
  }

  #welcome {
    color: var(--chalk-dim);
  }

  /* the beer button — the hero action once logged in */
  .beer-cta {
    display: block;
    width: 100%;
    margin: 28px 0 36px;
    padding: 22px;
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 32px;
    background: var(--chalk-yellow);
    color: var(--chalkboard-dark);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.25), 0 10px 24px rgba(0,0,0,0.3);
    transform: translateY(0);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .beer-cta:hover { color: var(--chalkboard-dark); }
  .beer-cta:active {
    transform: translateY(5px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.25), 0 4px 10px rgba(0,0,0,0.3);
  }

  /* leaderboard */
  .board-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--chalk-dim);
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .board-label::after {
    content: "";
    flex: 1;
    border-bottom: 1px dashed var(--line);
  }

  .board {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .row {
    display: grid;
    grid-template-columns: 28px 1fr auto 50px;
    align-items: center;
    gap: 14px;
    padding: 14px 6px;
    border-bottom: 1px solid var(--line);
  }
  .row:first-child {
    padding-top: 8px;
  }

  .rank {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--chalk-dim);
    opacity: 0.7;
  }
  .row:nth-child(1) .rank { color: var(--chalk-yellow); opacity: 1; }

  .name {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 26px;
  }

  .tally-marks {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: var(--chalk-pink);
    letter-spacing: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }

  .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    text-align: right;
    color: var(--chalk);
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--chalk-dim);
    font-size: 18px;
  }

  footer {
    text-align: center;
    margin-top: 48px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--chalk-dim);
    opacity: 0.5;
    letter-spacing: 0.1em;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }

  @media (max-width: 480px) {
    h1 { font-size: 48px; }
    .tally-marks { max-width: 90px; }
    input[type="email"], input[type="password"] { width: 100px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Day-by-day reckoning</div>
      <h1>Dry July Tally</h1>
      <div class="subtitle">the board doesn't lie</div>
    </header>

    <div class="account-corner">
      <div id="auth-section">
        <input id="email" type="email" placeholder="email" />
        <input id="password" type="password" placeholder="password" />
        <button onclick="login()">Log in</button>
        <span id="auth-status"></span>
      </div>

      <div id="drink-section" style="display:none;">
        <span id="welcome"></span>
        <button onclick="logout()">Log out</button>
      </div>
    </div>

    <button id="beer-button" class="beer-cta" style="display:none;" onclick="drinkBeer()">
      🍺 I caved — log a beer
    </button>

    <div class="board-label">Standings</div>
    <div id="tally" class="board"></div>
  </div>

  <footer>updates every few seconds — no refresh needed</footer>

<script>
    const SUPABASE_URL = "https://lokbhgpordcjrwtujwfx.supabase.co";
    const ANON_KEY = "your-anon-key";

    let accessToken = null;
    let refreshToken = null;
    let userEmail = null;

    function showDrinkUI(email) {
      userEmail = email;
      document.getElementById("auth-section").style.display = "none";
      document.getElementById("drink-section").style.display = "flex";
      document.getElementById("beer-button").style.display = "block";
      document.getElementById("welcome").innerText = email.split("@")[0];
    }

    function saveSession(data, email) {
      accessToken = data.access_token;
      refreshToken = data.refresh_token;
      localStorage.setItem("supabase_refresh_token", refreshToken);
      localStorage.setItem("supabase_email", email);
    }

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const statusEl = document.getElementById("auth-status");
      statusEl.innerText = "";

      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: "POST",
        headers: { apikey: ANON_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      if (!res.ok) {
        statusEl.innerText = "login failed";
        return;
      }

      saveSession(data, email);
      showDrinkUI(email);
    }

    async function tryRestoreSession() {
      const savedRefreshToken = localStorage.getItem("supabase_refresh_token");
      const savedEmail = localStorage.getItem("supabase_email");
      if (!savedRefreshToken) return;

      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
        method: "POST",
        headers: { apikey: ANON_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ refresh_token: savedRefreshToken })
      });

      const data = await res.json();
      if (!res.ok) {
        localStorage.removeItem("supabase_refresh_token");
        localStorage.removeItem("supabase_email");
        return;
      }

      saveSession(data, savedEmail);
      showDrinkUI(savedEmail);
    }

    function logout() {
      accessToken = null;
      refreshToken = null;
      userEmail = null;
      localStorage.removeItem("supabase_refresh_token");
      localStorage.removeItem("supabase_email");
      document.getElementById("auth-section").style.display = "flex";
      document.getElementById("drink-section").style.display = "none";
      document.getElementById("beer-button").style.display = "none";
    }

    async function drinkBeer() {
      const name = userEmail.split("@")[0];
      const btn = document.getElementById("beer-button");
      btn.disabled = true;
      await fetch(`${SUPABASE_URL}/rest/v1/beers`, {
        method: "POST",
        headers: {
          apikey: ANON_KEY,
          Authorization: `Bearer ${accessToken}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name })
      });
      btn.disabled = false;
      loadTally();
    }

    function tallyMarks(count) {
      // real chalk tally: groups of 4 uprights + a diagonal strike for every 5
      const groups = Math.floor(count / 5);
      const remainder = count % 5;
      const fives = Array(groups).fill("||||/").join(" ");
      const rest = "|".repeat(remainder);
      const combined = [fives, rest].filter(Boolean).join(" ");
      return combined || "—";
    }

    async function loadTally() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/beers?select=name`, {
        headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}` }
      });

      const board = document.getElementById("tally");
      if (!res.ok) {
        board.innerHTML = `<div class="empty-state">couldn't load the board (${res.status})</div>`;
        return;
      }

      const rows = await res.json();
      if (!Array.isArray(rows) || rows.length === 0) {
        board.innerHTML = `<div class="empty-state">nobody's cracked yet — the board is clean</div>`;
        return;
      }

      const counts = {};
      rows.forEach(r => counts[r.name] = (counts[r.name] || 0) + 1);

      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

      board.innerHTML = sorted.map(([name, count], i) => `
        <div class="row">
          <span class="rank">${i + 1}</span>
          <span class="name">${name}</span>
          <span class="tally-marks">${tallyMarks(count)}</span>
          <span class="count">${count}</span>
        </div>
      `).join("");
    }

    tryRestoreSession();
    loadTally();
    setInterval(loadTally, 5000);
</script>
</body>
</html>
